<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Clock - 可视化时钟</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            transition: all 0.5s ease;
        }

        /* ========== 6 套主题 ========== */
        body.theme-classic {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            --card-bg: rgba(255,255,255,0.85);
            --card-shadow: 0 8px 32px rgba(0,0,0,0.10);
            --text-color: #333;
            --text-secondary: #666;
            --border-color: rgba(0,0,0,0.08);
            --btn-bg: #fff;
            --btn-border: #ddd;
            --btn-hover: #f0f0f0;
            --clock-frame: #e0e0e0;
            --clock-bg: #fff;
            --clock-face: #f8f9fa;
            --tick-color: #444;
            --num-color: #222;
            --hour-color: #222;
            --min-color: #444;
            --sec-color: #e04040;
            --accent: #4a90d9;
            --card-radius: 16px;
            --badge-bg: #e8f0fe;
            --badge-text: #1a73e8;
            --remove-color: #e04040;
            --day-bg: #fff3c4;
            --night-bg: #1a2a6c;
            --day-text: #8d6e00;
            --night-text: #b0d4f1;
        }
        body.theme-cyberpunk {
            background: linear-gradient(135deg, #0a0015, #1a0040, #0d0020);
            --card-bg: rgba(20,0,40,0.75);
            --card-shadow: 0 0 30px rgba(0,255,255,0.15), 0 8px 32px rgba(0,0,0,0.5);
            --text-color: #00ffff;
            --text-secondary: #ff00ff;
            --border-color: rgba(0,255,255,0.2);
            --btn-bg: rgba(0,255,255,0.1);
            --btn-border: #00ffff;
            --btn-hover: rgba(0,255,255,0.25);
            --clock-frame: #00ffff;
            --clock-bg: rgba(0,10,30,0.85);
            --clock-face: rgba(0,255,255,0.05);
            --tick-color: #00ffff;
            --num-color: #ff00ff;
            --hour-color: #00ffff;
            --min-color: #ff00ff;
            --sec-color: #ff0066;
            --accent: #ff00ff;
            --card-radius: 8px;
            --badge-bg: rgba(0,255,255,0.15);
            --badge-text: #00ffff;
            --remove-color: #ff0066;
            --day-bg: rgba(255,200,0,0.2);
            --night-bg: rgba(0,0,30,0.5);
            --day-text: #ffdd00;
            --night-text: #00ffff;
        }
        body.theme-luxury {
            background: linear-gradient(135deg, #1a1000, #2d1a00, #1a1000);
            --card-bg: rgba(40,25,5,0.88);
            --card-shadow: 0 0 40px rgba(255,215,0,0.08), 0 8px 32px rgba(0,0,0,0.6);
            --text-color: #ffd700;
            --text-secondary: #c0a060;
            --border-color: rgba(255,215,0,0.15);
            --btn-bg: rgba(255,215,0,0.08);
            --btn-border: #ffd700;
            --btn-hover: rgba(255,215,0,0.2);
            --clock-frame: #8b6914;
            --clock-bg: rgba(30,18,3,0.9);
            --clock-face: rgba(255,215,0,0.03);
            --tick-color: #ffd700;
            --num-color: #ffd700;
            --hour-color: #ffd700;
            --min-color: #c0a060;
            --sec-color: #ff4500;
            --accent: #ffd700;
            --card-radius: 12px;
            --badge-bg: rgba(255,215,0,0.15);
            --badge-text: #ffd700;
            --remove-color: #ff4500;
            --day-bg: rgba(255,215,0,0.15);
            --night-bg: rgba(20,10,0,0.5);
            --day-text: #ffd700;
            --night-text: #c0a060;
        }
        body.theme-macaron {
            background: linear-gradient(135deg, #fce4ec, #f3e5f5, #e8eaf6);
            --card-bg: rgba(255,255,255,0.82);
            --card-shadow: 0 8px 32px rgba(255,182,193,0.25);
            --text-color: #7c4d6e;
            --text-secondary: #b5838d;
            --border-color: rgba(255,182,193,0.3);
            --btn-bg: #fff0f5;
            --btn-border: #f8bbd0;
            --btn-hover: #fce4ec;
            --clock-frame: #f8bbd0;
            --clock-bg: #fff5f9;
            --clock-face: #ffebf0;
            --tick-color: #c48a9b;
            --num-color: #9c6b7c;
            --hour-color: #e88d9c;
            --min-color: #b5838d;
            --sec-color: #ff6b9d;
            --accent: #e88d9c;
            --card-radius: 20px;
            --badge-bg: #fce4ec;
            --badge-text: #e88d9c;
            --remove-color: #ff6b9d;
            --day-bg: #fff9c4;
            --night-bg: #c5cae9;
            --day-text: #7c4d6e;
            --night-text: #5c3d4e;
        }
        body.theme-aurora {
            background: linear-gradient(135deg, #0c1445, #1a2a6c, #0c1445);
            --card-bg: rgba(20,30,80,0.7);
            --card-shadow: 0 0 40px rgba(100,200,255,0.1), 0 8px 32px rgba(0,0,0,0.4);
            --text-color: #b0d4f1;
            --text-secondary: #7ab8e0;
            --border-color: rgba(100,200,255,0.12);
            --btn-bg: rgba(100,200,255,0.08);
            --btn-border: rgba(100,200,255,0.4);
            --btn-hover: rgba(100,200,255,0.18);
            --clock-frame: rgba(100,200,255,0.3);
            --clock-bg: rgba(10,20,60,0.8);
            --clock-face: rgba(100,200,255,0.03);
            --tick-color: #7ab8e0;
            --num-color: #b0d4f1;
            --hour-color: #64c8ff;
            --min-color: #7ab8e0;
            --sec-color: #00e5ff;
            --accent: #64c8ff;
            --card-radius: 14px;
            --badge-bg: rgba(100,200,255,0.15);
            --badge-text: #64c8ff;
            --remove-color: #00e5ff;
            --day-bg: rgba(255,200,0,0.12);
            --night-bg: rgba(0,0,40,0.5);
            --day-text: #ffdd55;
            --night-text: #7ab8e0;
        }
        body.theme-retro {
            background: linear-gradient(135deg, #f5e6c8, #e8d5a3, #d4c4a0);
            --card-bg: rgba(250,240,220,0.85);
            --card-shadow: 0 8px 32px rgba(139,119,80,0.18);
            --text-color: #5c4033;
            --text-secondary: #8b7355;
            --border-color: rgba(139,119,80,0.2);
            --btn-bg: #f5e6c8;
            --btn-border: #c4a97d;
            --btn-hover: #e8d5a3;
            --clock-frame: #8b7355;
            --clock-bg: #faf5e8;
            --clock-face: #f5eedc;
            --tick-color: #6b5344;
            --num-color: #5c4033;
            --hour-color: #5c4033;
            --min-color: #8b7355;
            --sec-color: #c0392b;
            --accent: #8b6914;
            --card-radius: 10px;
            --badge-bg: #e8d5a3;
            --badge-text: #5c4033;
            --remove-color: #c0392b;
            --day-bg: #fff3c4;
            --night-bg: #c4a97d;
            --day-text: #5c4033;
            --night-text: #3a2518;
        }

        /* ---- 主题选择器 ---- */
        .theme-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--card-bg);
            padding: 8px 14px;
            border-radius: 30px;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
        }
        .theme-selector label { font-size: 13px; color: var(--text-color); font-weight: bold; }
        .theme-selector select {
            padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border-color);
            background: var(--btn-bg); color: var(--text-color); font-size: 13px;
            cursor: pointer; outline: none; transition: all 0.3s;
        }
        .theme-selector select:hover { border-color: var(--accent); }
        .theme-swatches { display: flex; gap: 6px; }
        .theme-dot {
            width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; transition: all 0.3s;
        }
        .theme-dot:hover { transform: scale(1.2); }
        .theme-dot.active { border-color: var(--text-color); box-shadow: 0 0 8px var(--accent); }
        .theme-dot[data-theme="classic"] { background: linear-gradient(135deg, #667eea, #764ba2); }
        .theme-dot[data-theme="cyberpunk"] { background: linear-gradient(135deg, #ff00ff, #00ffff); }
        .theme-dot[data-theme="luxury"] { background: linear-gradient(135deg, #8b6914, #ffd700); }
        .theme-dot[data-theme="macaron"] { background: linear-gradient(135deg, #f8bbd0, #ce93d8); }
        .theme-dot[data-theme="aurora"] { background: linear-gradient(135deg, #0f2b6b, #64c8ff); }
        .theme-dot[data-theme="retro"] { background: linear-gradient(135deg, #8b7355, #c4a97d); }

        .container { display: flex; gap: 30px; padding: 30px; flex-wrap: wrap; justify-content: center; }

        /* ---- 左侧 ---- */
        .clock-area { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        canvas#analogClock { width: 380px; height: 380px; border-radius: 50%; box-shadow: var(--card-shadow); transition: box-shadow 0.5s; }
        #digitalClock {
            font-size: 42px; font-weight: bold; letter-spacing: 3px; color: var(--text-color);
            text-shadow: 0 0 20px color-mix(in srgb, var(--accent) 30%, transparent); transition: color 0.5s;
        }
        #dateDisplay { font-size: 18px; color: var(--text-secondary); transition: color 0.5s; }
        #themeBtn {
            padding: 10px 28px; font-size: 15px; border: 1px solid var(--btn-border);
            border-radius: 30px; background: var(--btn-bg); color: var(--text-color);
            cursor: pointer; transition: all 0.3s; backdrop-filter: blur(5px); font-weight: bold;
        }
        #themeBtn:hover { background: var(--btn-hover); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .theme-tag {
            font-size: 12px; padding: 4px 14px; border-radius: 20px;
            background: var(--btn-bg); color: var(--text-secondary); border: 1px solid var(--border-color);
        }

        /* ---- 右侧 ---- */
        .right-panel { display: flex; flex-direction: column; gap: 18px; min-width: 340px; flex: 1; max-width: 440px; }

        .card {
            background: var(--card-bg); border-radius: var(--card-radius); padding: 16px 18px;
            box-shadow: var(--card-shadow); backdrop-filter: blur(12px);
            border: 1px solid var(--border-color); transition: all 0.5s;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px color-mix(in srgb, var(--accent) 15%, rgba(0,0,0,0.15)); }
        .card h3 {
            margin-bottom: 12px; font-size: 15px; border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px; color: var(--text-color); letter-spacing: 1px;
            display: flex; align-items: center; gap: 8px;
        }
        .card h3::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border-color), transparent); }
        .card-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; }
        .card-row input, .card-row select {
            flex: 1; padding: 7px 12px; border: 1px solid var(--border-color); border-radius: 8px;
            font-size: 14px; background: var(--btn-bg); color: var(--text-color);
            transition: all 0.3s; outline: none;
        }
        .card-row input:focus, .card-row select:focus { border-color: var(--accent); box-shadow: 0 0 8px color-mix(in srgb, var(--accent) 30%, transparent); }
        .card-row button {
            padding: 7px 16px; border: 1px solid var(--btn-border); border-radius: 8px;
            background: var(--btn-bg); cursor: pointer; font-size: 14px; color: var(--text-color);
            transition: all 0.25s; font-weight: 500;
        }
        .card-row button:hover { background: var(--btn-hover); border-color: var(--accent); transform: translateY(-1px); }
        .card-row button:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
        .btn-group { display: flex; gap: 6px; }
        .btn-group button { flex: 1; }

        /* ---- 闹钟列表 ---- */
        .alarm-list { list-style: none; padding: 0; margin: 8px 0 0; max-height: 150px; overflow-y: auto; }
        .alarm-list li {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 8px; border-bottom: 1px dashed var(--border-color); font-size: 13px; color: var(--text-color);
        }
        .alarm-list li:first-child { border-top: 1px dashed var(--border-color); }
        .alarm-time { font-weight: bold; letter-spacing: 1px; }
        .alarm-badge {
            font-size: 10px; padding: 2px 8px; border-radius: 10px;
            background: var(--badge-bg); color: var(--badge-text); margin-left: 8px;
        }
        .alarm-del {
            cursor: pointer; color: var(--remove-color); font-size: 16px; padding: 0 4px;
            transition: all 0.2s; border: none; background: none; line-height: 1;
        }
        .alarm-del:hover { transform: scale(1.3); }
        .alarm-empty { text-align: center; font-size: 13px; color: var(--text-secondary); padding: 12px 0; }

        /* ---- 秒表 ---- */
        #stopwatchDisplay {
            text-align: center; font-size: 28px; font-weight: bold; letter-spacing: 3px;
            padding: 10px 0; color: var(--text-color);
            text-shadow: 0 0 15px color-mix(in srgb, var(--accent) 20%, transparent);
        }
        #lapList {
            max-height: 80px; overflow-y: auto; font-size: 12px; list-style: none;
            padding: 0; margin: 6px 0 0;
        }
        #lapList li { padding: 3px 6px; border-bottom: 1px dashed var(--border-color); color: var(--text-secondary); font-size: 12px; }

        /* ---- 世界时钟城市列表 ---- */
        .city-add-row { display: flex; gap: 8px; }
        .city-add-row select { flex: 1; }
        .city-list { list-style: none; padding: 0; margin: 8px 0 0; max-height: 220px; overflow-y: auto; }
        .city-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 10px; border-radius: 10px; margin-bottom: 6px;
            border: 1px solid var(--border-color); transition: all 0.3s;
        }
        .city-item.day { background: var(--day-bg); }
        .city-item.night { background: var(--night-bg); }
        .city-flag { font-size: 20px; }
        .city-info { flex: 1; }
        .city-name { font-size: 13px; font-weight: bold; color: var(--text-color); }
        .city-detail { font-size: 11px; color: var(--text-secondary); display: flex; gap: 8px; margin-top: 2px; }
        .city-time { font-size: 18px; font-weight: bold; letter-spacing: 2px; color: var(--text-color); min-width: 70px; text-align: right; }
        .city-status {
            font-size: 10px; padding: 2px 8px; border-radius: 10px; text-align: center;
            white-space: nowrap;
        }
        .city-status.day { background: #ffd54f; color: #5c3d00; }
        .city-status.night { background: #3f51b5; color: #fff; }
        .city-del {
            cursor: pointer; color: var(--remove-color); font-size: 16px;
            transition: all 0.2s; border: none; background: none; padding: 0 4px;
        }
        .city-del:hover { transform: scale(1.3); }
        .city-empty { text-align: center; font-size: 13px; color: var(--text-secondary); padding: 12px 0; }
        .city-utc { font-size: 10px; padding: 1px 6px; border-radius: 8px; background: var(--badge-bg); color: var(--badge-text); }

        #worldClockDisplay { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

        @media (max-width: 768px) {
            canvas#analogClock { width: 280px; height: 280px; }
            .right-panel { min-width: 280px; }
            .theme-selector { top: 10px; right: 10px; padding: 6px 12px; }
            .theme-selector select { font-size: 12px; }
        }
    </style>
</head>
<body class="theme-classic">

<!-- 主题选择器 -->
<div class="theme-selector">
    <label>🎨</label>
    <select id="themeSelect">
        <option value="classic">✨ 经典简约</option>
        <option value="cyberpunk">🤖 赛博朋克</option>
        <option value="luxury">👑 暗黑奢华</option>
        <option value="macaron">🌸 马卡龙甜心</option>
        <option value="aurora">🌌 极光蓝调</option>
        <option value="retro">📻 复古怀旧</option>
    </select>
    <div class="theme-swatches">
        <div class="theme-dot active" data-theme="classic"></div>
        <div class="theme-dot" data-theme="cyberpunk"></div>
        <div class="theme-dot" data-theme="luxury"></div>
        <div class="theme-dot" data-theme="macaron"></div>
        <div class="theme-dot" data-theme="aurora"></div>
        <div class="theme-dot" data-theme="retro"></div>
    </div>
</div>

<div class="container">
    <!-- 左侧时钟区 -->
    <div class="clock-area">
        <canvas id="analogClock" width="400" height="400"></canvas>
        <div id="digitalClock">00:00:00</div>
        <div id="dateDisplay">----年--月--日 星期-</div>
        <div class="theme-tag" id="themeTag">✨ 经典简约</div>
        <button id="themeBtn">🌙 切换深色</button>
    </div>

    <!-- 右侧功能区 -->
    <div class="right-panel">

        <!-- ⏰ 闹钟提醒（多闹钟列表） -->
        <div class="card">
            <h3>⏰ 闹钟提醒</h3>
            <div class="card-row">
                <input type="time" id="alarmInput" value="08:00" step="1">
                <button id="addAlarmBtn">➕ 添加闹钟</button>
            </div>
            <ul class="alarm-list" id="alarmList">
                <li class="alarm-empty">暂无闹钟，点击上方添加</li>
            </ul>
        </div>

        <!-- ⏱ 秒表计时 -->
        <div class="card">
            <h3>⏱ 秒表计时</h3>
            <div id="stopwatchDisplay">00:00:00.000</div>
            <div class="card-row btn-group">
                <button id="swStartBtn">▶ 开始</button>
                <button id="swLapBtn" disabled>📋 记圈</button>
                <button id="swResetBtn" disabled>↺ 重置</button>
            </div>
            <ul id="lapList"></ul>
        </div>

        <!-- 🌍 世界时钟（多城市列表） -->
        <div class="card">
            <h3>🌍 世界时钟</h3>
            <div class="card-row city-add-row">
                <select id="citySelect">
                    <option value="28800,🇨🇳,北京">🇨🇳 北京 (UTC+8)</option>
                    <option value="0,🇬🇧,伦敦">🇬🇧 伦敦 (UTC+0)</option>
                    <option value="-18000,🇺🇸,纽约">🇺🇸 纽约 (UTC-5)</option>
                    <option value="-28800,🇺🇸,洛杉矶">🇺🇸 洛杉矶 (UTC-8)</option>
                    <option value="32400,🇯🇵,东京">🇯🇵 东京 (UTC+9)</option>
                    <option value="3600,🇫🇷,巴黎">🇫🇷 巴黎 (UTC+1)</option>
                    <option value="39600,🇦🇺,悉尼">🇦🇺 悉尼 (UTC+11)</option>
                    <option value="14400,🇦🇪,迪拜">🇦🇪 迪拜 (UTC+4)</option>
                    <option value="19800,🇮🇳,新德里">🇮🇳 新德里 (UTC+5:30)</option>
                    <option value="36000,🇰🇷,首尔">🇰🇷 首尔 (UTC+9)</option>
                    <option value="-21600,🇲🇽,墨西哥城">🇲🇽 墨西哥城 (UTC-6)</option>
                    <option value="10800,🇷🇺,莫斯科">🇷🇺 莫斯科 (UTC+3)</option>
                    <option value="7200,🇿🇦,开普敦">🇿🇦 开普敦 (UTC+2)</option>
                    <option value="-14400,🇨🇱,圣地亚哥">🇨🇱 圣地亚哥 (UTC-4)</option>
                    <option value="43200,🇳🇿,惠灵顿">🇳🇿 惠灵顿 (UTC+12)</option>
                </select>
                <button id="addCityBtn">➕ 添加</button>
            </div>
            <ul class="city-list" id="cityList">
                <!-- 默认显示北京 -->
            </ul>
        </div>

    </div>
</div>

<script>
// ============================================================
// 主题系统
// ============================================================
const THEMES = {
    classic:  { name: '✨ 经典简约', darkAvailable: true },
    cyberpunk: { name: '🤖 赛博朋克', darkAvailable: false },
    luxury:   { name: '👑 暗黑奢华', darkAvailable: false },
    macaron:  { name: '🌸 马卡龙甜心', darkAvailable: false },
    aurora:   { name: '🌌 极光蓝调', darkAvailable: false },
    retro:    { name: '📻 复古怀旧', darkAvailable: false }
};
let currentTheme = 'classic';
let darkOverride = false;
const themeSelect = document.getElementById('themeSelect');
const themeDots = document.querySelectorAll('.theme-dot');
const themeTag = document.getElementById('themeTag');
const themeBtn = document.getElementById('themeBtn');

function applyTheme(themeId) {
    currentTheme = themeId;
    document.body.className = '';
    document.body.classList.add(`theme-${themeId}`);
    themeSelect.value = themeId;
    themeDots.forEach(d => d.classList.toggle('active', d.dataset.theme === themeId));
    themeTag.textContent = THEMES[themeId].name;

    if (THEMES[themeId].darkAvailable) {
        themeBtn.style.display = 'block';
    } else {
        themeBtn.style.display = 'none';
        document.body.classList.remove('dark');
        for (const prop of ['--card-bg','--text-color','--text-secondary','--border-color','--btn-bg','--btn-border','--btn-hover']) {
            document.body.style.removeProperty(prop);
        }
    }

    if (themeId === 'classic') {
        const isDark = darkOverride;
        if (isDark) {
            document.body.style.setProperty('--card-bg', 'rgba(35,35,45,0.9)');
            document.body.style.setProperty('--text-color', '#ddd');
            document.body.style.setProperty('--text-secondary', '#aaa');
            document.body.style.setProperty('--border-color', 'rgba(255,255,255,0.08)');
            document.body.style.setProperty('--btn-bg', '#3a3a45');
            document.body.style.setProperty('--btn-border', '#555');
            document.body.style.setProperty('--btn-hover', '#4a4a55');
            document.body.style.background = 'linear-gradient(135deg, #1a1a24, #2a2a35)';
            themeBtn.textContent = '☀️ 切换浅色';
        } else {
            document.body.style.removeProperty('--card-bg');
            document.body.style.removeProperty('--text-color');
            document.body.style.removeProperty('--text-secondary');
            document.body.style.removeProperty('--border-color');
            document.body.style.removeProperty('--btn-bg');
            document.body.style.removeProperty('--btn-border');
            document.body.style.removeProperty('--btn-hover');
            document.body.style.background = '';
            themeBtn.textContent = '🌙 切换深色';
        }
    }
}
themeSelect.addEventListener('change', () => applyTheme(themeSelect.value));
themeDots.forEach(d => d.addEventListener('click', () => applyTheme(d.dataset.theme)));
themeBtn.addEventListener('click', () => { if (currentTheme === 'classic') { darkOverride = !darkOverride; applyTheme('classic'); } });

// ============================================================
// 1. 模拟表盘
// ============================================================
const canvas = document.getElementById('analogClock');
const ctx = canvas.getContext('2d');
const cx = 200, cy = 200, R = 180;
function getCSSVar(name) { return getComputedStyle(document.body).getPropertyValue(name).trim(); }
function drawClock() {
    const now = new Date();
    const h = now.getHours() % 12, m = now.getMinutes(), s = now.getSeconds(), ms = now.getMilliseconds();
    const bg = getCSSVar('--clock-bg') || '#fff', frame = getCSSVar('--clock-frame') || '#e0e0e0';
    const face = getCSSVar('--clock-face') || '#f8f9fa', tick = getCSSVar('--tick-color') || '#444';
    const num = getCSSVar('--num-color') || '#222', hColor = getCSSVar('--hour-color') || '#222';
    const mColor = getCSSVar('--min-color') || '#444', sColor = getCSSVar('--sec-color') || '#e04040';
    const accent = getCSSVar('--accent') || '#4a90d9';

    ctx.clearRect(0, 0, 400, 400);
    ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(cx, cy, R, 0, 2*Math.PI); ctx.fill();
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
    grad.addColorStop(0, face); grad.addColorStop(0.85, face); grad.addColorStop(0.92, frame); grad.addColorStop(1, frame);
    ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(cx, cy, R, 0, 2*Math.PI); ctx.fill();
    ctx.strokeStyle = frame; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx, cy, R, 0, 2*Math.PI); ctx.stroke();

    for (let i = 0; i < 60; i++) {
        const a = (i*6-90)*Math.PI/180; const M = i%5===0;
        const o = M?R-16:R-18, inn = M?R-30:R-26;
        ctx.strokeStyle=tick; ctx.lineWidth=M?3:1; ctx.beginPath();
        ctx.moveTo(cx+o*Math.cos(a),cy+o*Math.sin(a)); ctx.lineTo(cx+inn*Math.cos(a),cy+inn*Math.sin(a)); ctx.stroke();
    }
    ctx.fillStyle=num; ctx.font='bold 20px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    for (let i=1;i<=12;i++) { const a=(i*30-90)*Math.PI/180; ctx.fillText(i.toString(),cx+(R-45)*Math.cos(a),cy+(R-45)*Math.sin(a)); }
    ctx.fillStyle=accent; ctx.font='8px Arial'; ctx.globalAlpha=0.4; ctx.fillText('VISUAL CLOCK',cx,cy+R-38); ctx.globalAlpha=1;

    const ha=(30*h+0.5*m-90)*Math.PI/180, ma=(6*m+0.1*s-90)*Math.PI/180, sa=(6*s+6*(ms/1000)-90)*Math.PI/180;
    ctx.strokeStyle=hColor; ctx.lineWidth=6; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+50*Math.cos(ha),cy+50*Math.sin(ha)); ctx.stroke();
    ctx.strokeStyle=mColor; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+70*Math.cos(ma),cy+70*Math.sin(ma)); ctx.stroke();
    ctx.strokeStyle=sColor; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx-15*Math.cos(sa),cy-15*Math.sin(sa)); ctx.lineTo(cx+80*Math.cos(sa),cy+80*Math.sin(sa)); ctx.stroke();
    ctx.fillStyle=sColor; ctx.beginPath(); ctx.arc(cx+80*Math.cos(sa),cy+80*Math.sin(sa),4,0,2*Math.PI); ctx.fill();
    ctx.fillStyle=hColor; ctx.beginPath(); ctx.arc(cx,cy,5,0,2*Math.PI); ctx.fill();
    ctx.fillStyle=sColor; ctx.beginPath(); ctx.arc(cx,cy,2.5,0,2*Math.PI); ctx.fill();
    requestAnimationFrame(drawClock);
}
drawClock();

const weekdays = ['星期一','星期二','星期三','星期四','星期五','星期六','星期日'];
function updateDateTime() {
    const n=new Date();
    document.getElementById('digitalClock').textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
    const w=weekdays[n.getDay()===0?6:n.getDay()-1];
    document.getElementById('dateDisplay').textContent=`${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日 ${w}`;
}
setInterval(updateDateTime,1000); updateDateTime();

// ============================================================
// 5. 多闹钟系统
// ============================================================
let alarms = []; // { id, time: "HH:MM", active }

const alarmInput = document.getElementById('alarmInput');
const addAlarmBtn = document.getElementById('addAlarmBtn');
const alarmListEl = document.getElementById('alarmList');

function renderAlarms() {
    alarmListEl.innerHTML = '';
    if (alarms.length === 0) {
        alarmListEl.innerHTML = '<li class="alarm-empty">暂无闹钟，点击上方添加</li>';
        return;
    }
    alarms.forEach((a, idx) => {
        const li = document.createElement('li');
        const now = new Date();
        const [h,m] = a.time.split(':').map(Number);
        const alarmMin = h*60+m, nowMin = now.getHours()*60+now.getMinutes();
        const isSoon = (alarmMin - nowMin + 1440) % 1440 < 30 && (alarmMin - nowMin + 1440) % 1440 > 0;
        li.innerHTML = `
            <span><span class="alarm-time">${a.time}</span><span class="alarm-badge">${isSoon?'⏳ 即将响铃':'🔔 已开启'}</span></span>
            <button class="alarm-del" data-idx="${idx}">✕</button>
        `;
        alarmListEl.appendChild(li);
    });
    // 删除事件
    document.querySelectorAll('.alarm-del').forEach(btn => {
        btn.addEventListener('click', () => {
            const idx = parseInt(btn.dataset.idx);
            alarms.splice(idx, 1);
            renderAlarms();
        });
    });
}

addAlarmBtn.addEventListener('click', () => {
    const t = alarmInput.value;
    if (!t) return;
    // 避免重复
    if (alarms.some(a => a.time === t)) { alert('该时间已有闹钟'); return; }
    alarms.push({ id: Date.now(), time: t });
    renderAlarms();
});

function checkAlarms() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0'), mm = String(now.getMinutes()).padStart(2,'0');
    const current = `${hh}:${mm}`;
    const toRemove = [];
    alarms.forEach((a, idx) => {
        if (a.time === current && now.getSeconds() === 0) {
            alert(`⏰ 闹钟时间到！(${a.time})`);
            toRemove.push(idx);
        }
    });
    if (toRemove.length) {
        toRemove.sort((a,b)=>b-a).forEach(i => alarms.splice(i,1));
        renderAlarms();
    }
    // 更新 badge
    renderAlarms();
}
setInterval(checkAlarms, 1000);

// 6. 秒表
// ============================================================
let swRunning=false, swStartTime=0, swOffset=0, swInterval=null, lapCount=0;
const swD=document.getElementById('stopwatchDisplay'), swB=document.getElementById('swStartBtn');
const swL=document.getElementById('swLapBtn'), swR=document.getElementById('swResetBtn'), lapL=document.getElementById('lapList');
function fmt(ms){const t=Math.floor(ms/1000);return `${String(Math.floor(t/3600)).padStart(2,'0')}:${String(Math.floor((t%3600)/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}.${String(ms%1000).padStart(3,'0')}`;}
swB.addEventListener('click',()=>{
    if(!swRunning){swRunning=true;swStartTime=Date.now();swInterval=setInterval(()=>{swD.textContent=fmt(swOffset+(Date.now()-swStartTime));},50);swB.textContent='⏸ 暂停';swL.disabled=false;swR.disabled=false;}
    else{swRunning=false;swOffset+=Date.now()-swStartTime;clearInterval(swInterval);swB.textContent='▶ 继续';swL.disabled=true;}
});
swL.addEventListener('click',()=>{if(swRunning){lapCount++;const li=document.createElement('li');li.textContent=`第 ${lapCount} 圈: ${fmt(swOffset+(Date.now()-swStartTime))}`;lapL.appendChild(li);lapL.scrollTop=lapL.scrollHeight;}});
swR.addEventListener('click',()=>{swRunning=false;swOffset=0;lapCount=0;clearInterval(swInterval);swD.textContent='00:00:00.000';swB.textContent='▶ 开始';swL.disabled=true;swR.disabled=true;lapL.innerHTML='';});

// ============================================================
// 预置城市数据库
const CITY_DB = [
    {offset:28800, flag:'🇨🇳', name:'北京', utc:'UTC+8'},
    {offset:0, flag:'🇬🇧', name:'伦敦', utc:'UTC+0'},
    {offset:-18000, flag:'🇺🇸', name:'纽约', utc:'UTC-5'},
    {offset:-28800, flag:'🇺🇸', name:'洛杉矶', utc:'UTC-8'},
    {offset:32400, flag:'🇯🇵', name:'东京', utc:'UTC+9'},
    {offset:3600, flag:'🇫🇷', name:'巴黎', utc:'UTC+1'},
    {offset:39600, flag:'🇦🇺', name:'悉尼', utc:'UTC+11'},
    {offset:14400, flag:'🇦🇪', name:'迪拜', utc:'UTC+4'},
    {offset:19800, flag:'🇮🇳', name:'新德里', utc:'UTC+5:30'},
    {offset:36000, flag:'🇰🇷', name:'首尔', utc:'UTC+9'},
    {offset:-21600, flag:'🇲🇽', name:'墨西哥城', utc:'UTC-6'},
    {offset:10800, flag:'🇷🇺', name:'莫斯科', utc:'UTC+3'},
    {offset:7200, flag:'🇿🇦', name:'开普敦', utc:'UTC+2'},
    {offset:-14400, flag:'🇨🇱', name:'圣地亚哥', utc:'UTC-4'},
    {offset:43200, flag:'🇳🇿', name:'惠灵顿', utc:'UTC+12'},
];

let cities = [
    {offset:28800, flag:'🇨🇳', name:'北京', utc:'UTC+8'},
    {offset:0, flag:'🇬🇧', name:'伦敦', utc:'UTC+0'},
    {offset:-18000, flag:'🇺🇸', name:'纽约', utc:'UTC-5'},
];

const citySelect = document.getElementById('citySelect');
const addCityBtn = document.getElementById('addCityBtn');
const cityListEl = document.getElementById('cityList');

// 用 UTC+offset 算当前时间，判断昼夜（6:00~18:00 = 白天）
function getCityTime(offset) {
    const utc = Date.now() + new Date().getTimezoneOffset() * 60000;
    const d = new Date(utc + offset * 1000);
    const h = d.getHours();
    return {
        timeStr: `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`,
        isDay: h >= 6 && h < 18,
        status: (h >= 6 && h < 18) ? '☀️ 白天' : '🌙 夜晚',
        hour: h,
        delta: offset
    };
}

function renderCities() {
    cityListEl.innerHTML = '';
    if (cities.length === 0) {
        cityListEl.innerHTML = '<li class="city-empty">暂无城市，点击上方添加</li>';
        return;
    }
    // 计算本地时区偏移（分钟转秒）
    const localOffset = -new Date().getTimezoneOffset() * 60;

    cities.forEach((c, idx) => {
        const ct = getCityTime(c.offset);
        const li = document.createElement('li');
        li.className = `city-item ${ct.isDay ? 'day' : 'night'}`;
        // 时差计算
        const diffSec = c.offset - localOffset;
        const diffH = diffSec / 3600;
        let diffStr = '';
        if (Math.abs(diffH) < 0.01) diffStr = '⏺ 同区';
        else if (diffH > 0) diffStr = `+${diffH.toFixed(1)}h`;
        else diffStr = `${diffH.toFixed(1)}h`;

        li.innerHTML = `
            <span class="city-flag">${c.flag}</span>
            <div class="city-info">
                <div class="city-name">${c.name} <span class="city-utc">${c.utc}</span> <span class="city-utc" style="background:var(--badge-bg);color:var(--badge-text);">${diffStr}</span></div>
                <div class="city-detail">
                    <span class="city-status ${ct.isDay?'day':'night'}">${ct.status}</span>
                </div>
            </div>
            <span class="city-time">${ct.timeStr}</span>
            <button class="city-del" data-idx="${idx}">✕</button>
        `;
        cityListEl.appendChild(li);
    });
    document.querySelectorAll('.city-del').forEach(btn => {
        btn.addEventListener('click', () => {
            const idx = parseInt(btn.dataset.idx);
            cities.splice(idx, 1);
            renderCities();
        });
    });
}

addCityBtn.addEventListener('click', () => {
    const val = citySelect.value;
    if (!val) return;
    const parts = val.split(',');
    const offset = parseInt(parts[0]), flag = parts[1], name = parts[2];
    if (cities.some(c => c.name === name)) { alert(`"${name}" 已添加`); return; }
    const dbEntry = CITY_DB.find(c => c.name === name);
    cities.push({offset, flag, name, utc: dbEntry ? dbEntry.utc : ''});
    renderCities();
});

// 定时更新所有城市
function updateCities() { renderCities(); }
setInterval(updateCities, 1000);

// 初始化
applyTheme('classic');
renderCities();
</script>
